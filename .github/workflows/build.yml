name: Build libxml2 Cross-Platform

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  release:
    types: [published]

jobs:
  build-android:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [arm64-v8a, armeabi-v7a, x86, x86_64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c
          add-to-path: true

      - name: Verify NDK installation
        run: |
          echo "NDK path: $ANDROID_NDK_ROOT"
          ls -la "$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin/" | head -20

      - name: Build libxml2 for Android
        run: |
          chmod +x scripts/build_libxml2.sh
          ./scripts/build_libxml2.sh \
            --platform android \
            --arch ${{ matrix.arch }} \
            --ndk-path $ANDROID_NDK_ROOT \
            --api-level 21 \
            --src-dir ./build/src \
            --install-dir ./prebuilt/android-21

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: libxml2-android-${{ matrix.arch }}
          path: prebuilt/android-21/${{ matrix.arch }}
          retention-days: 30

  test-rust-build:
    needs: [build-android]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: aarch64-linux-android
            arch: arm64-v8a
          - target: armv7-linux-androideabi
            arch: armeabi-v7a
          - target: i686-linux-android
            arch: x86
          - target: x86_64-linux-android
            arch: x86_64

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Setup prebuilt libraries
        run: |
          mkdir -p prebuilt

          # 设置Android库 (如果存在)
          if [ -d "artifacts/libxml2-android-${{ matrix.arch }}" ]; then
            echo "Setting up Android prebuilt libraries for ${{ matrix.arch }}"
            cp -r artifacts/libxml2-android-${{ matrix.arch }}/* prebuilt/
            echo "LIBXML2_PREBUILT_PATH=$(pwd)/prebuilt" >> $GITHUB_ENV
          else
            echo "No prebuilt libraries found for ${{ matrix.arch }}"
          fi

      - name: Test Rust build
        run: |
          rustup target add ${{ matrix.target }}
          echo "Building for target: ${{ matrix.target }}"
          cargo build --target ${{ matrix.target }} --release -vv
        env:
          RUST_BACKTRACE: 1
