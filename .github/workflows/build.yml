name: Build libxml2 Cross-Platform

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  release:
    types: [published]

jobs:
  build-android:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: aarch64-linux-android
            arch: arm64-v8a
          - target: armv7-linux-androideabi
            arch: armeabi-v7a
          - target: i686-linux-android
            arch: x86
          - target: x86_64-linux-android
            arch: x86_64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c
          add-to-path: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Build libxml2 for Android
        run: |
          chmod +x scripts/build_libxml2.sh
          ./scripts/build_libxml2.sh \
            --platform android \
            --arch ${{ matrix.arch }} \
            --ndk-path $ANDROID_NDK_ROOT \
            --api-level 21 \
            --src-dir ./build/src \
            --install-dir ./prebuilt/android-21

      - name: Test Rust build
        run: |
          echo "Building for target: ${{ matrix.target }}"
          cargo build --target ${{ matrix.target }} --release -vv
        env:
          LIBXML2_PREBUILT_PATH: ${{ github.workspace }}/prebuilt/android-21
          RUST_BACKTRACE: 1
