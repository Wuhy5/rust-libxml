name: Build libxml2 Cross-Platform

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  release:
    types: [published]

jobs:
  build-android:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [arm64-v8a, armeabi-v7a, x86, x86_64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c
          add-to-path: true

      - name: Verify NDK installation
        run: |
          echo "NDK path: $ANDROID_NDK_ROOT"
          ls -la "$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin/" | head -20

      - name: Build libxml2 for Android
        run: |
          chmod +x scripts/build_libxml2.sh
          ./scripts/build_libxml2.sh \
            --platform android \
            --arch ${{ matrix.arch }} \
            --ndk-path $ANDROID_NDK_ROOT \
            --api-level 21 \
            --src-dir ./build/src \
            --install-dir ./prebuilt/android-21

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: libxml2-android-${{ matrix.arch }}
          path: prebuilt/android-21/${{ matrix.arch }}
          retention-days: 30

  test-rust-build:
    needs: [build-android]
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Setup prebuilt libraries
        run: |
          mkdir -p prebuilt

          # 设置Android库 (如果存在)
          if [ -d "artifacts/libxml2-android-arm64-v8a" ]; then
            mkdir -p prebuilt/android-21
            for arch in arm64-v8a armeabi-v7a x86 x86_64; do
              if [ -d "artifacts/libxml2-android-$arch" ]; then
                cp -r "artifacts/libxml2-android-$arch" "prebuilt/android-21/$arch"
              fi
            done
            echo "LIBXML2_PREBUILT_PATH=$(pwd)/prebuilt/android-21" >> $GITHUB_ENV
          fi

      - name: Test Rust build
        run: |
          # 测试普通构建
          cargo build --verbose

          # 如果是macOS，测试iOS目标
          if [ "${{ matrix.os }}" = "macos-latest" ]; then
            rustup target add aarch64-apple-ios
            cargo build --target aarch64-apple-ios --verbose || echo "iOS build failed (expected if cross-compilation setup incomplete)"
          fi
