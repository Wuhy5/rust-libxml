name: Build libxml2 Cross-Platform

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  release:
    types: [published]

jobs:
  build-android:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [arm64-v8a, armeabi-v7a, x86, x86_64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c
          add-to-path: true

      - name: Verify NDK installation
        run: |
          echo "NDK path: $ANDROID_NDK_ROOT"
          ls -la "$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin/" | head -20

      - name: Build libxml2 for Android
        run: |
          chmod +x scripts/build_libxml2.sh
          ./scripts/build_libxml2.sh \
            --platform android \
            --arch ${{ matrix.arch }} \
            --ndk-path $ANDROID_NDK_ROOT \
            --api-level 21 \
            --src-dir ./build/src \
            --install-dir ./prebuilt/android-21

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: libxml2-android-${{ matrix.arch }}
          path: prebuilt/android-21/${{ matrix.arch }}
          retention-days: 30

  test-rust-build:
    needs: [build-android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Setup prebuilt libraries
        run: |
          mkdir -p prebuilt

          # 设置Android库 (如果存在)
          if [ -d "artifacts/libxml2-android-arm64-v8a" ]; then
          mkdir -p prebuilt/android-21
          for arch in arm64-v8a armeabi-v7a x86 x86_64; do
            if [ -d "artifacts/libxml2-android-$arch" ]; then
            cp -r "artifacts/libxml2-android-$arch" "prebuilt/android-21/$arch"
            fi
          done
          echo "LIBXML2_PREBUILT_PATH=$(pwd)/prebuilt/android-21" >> $GITHUB_ENV
          fi

      - name: Test Rust build (Android cross, arm64-v8a)
        run: |
          rustup target add aarch64-linux-android
          cargo build --target aarch64-linux-android --release -vv
        env:
          RUST_BACKTRACE: 1

      - name: Test Rust build (Android cross, armeabi-v7a)
        run: |
          rustup target add armv7-linux-androideabi
          cargo build --target armv7-linux-androideabi --release -vv
        env:
          RUST_BACKTRACE: 1

      - name: Test Rust build (Android cross, x86)
        run: |
          rustup target add i686-linux-android
          cargo build --target i686-linux-android --release -vv
        env:
          RUST_BACKTRACE: 1

      - name: Test Rust build (Android cross, x86_64)
        run: |
          rustup target add x86_64-linux-android
          cargo build --target x86_64-linux-android --release -vv
        env:
          RUST_BACKTRACE: 1
          
